<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>realtime-agent-visualize · agent chat</title>
<style>
  :root { --bg:#0d0f13; --panel:#161a22; --panel2:#1c212b; --line:#252b37; --fg:#e7e9ee;
          --mut:#8a93a3; --accent:#5c7cfa; --accent2:#8ea2ff; --ok:#37b24d; --warn:#f59f00; --err:#ef5350; }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         display:flex; flex-direction:column; }
  header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok); }
  header h1 { font-size:14px; margin:0; font-weight:650; }
  header .sub { font-size:12px; color:var(--mut); }
  #chat { flex:1; overflow-y:auto; padding:24px 0 8px; }
  .inner { max-width:880px; margin:0 auto; padding:0 20px; }
  .msg { display:flex; gap:12px; margin:0 0 18px; }
  .msg .av { width:28px; height:28px; border-radius:8px; flex:0 0 28px; display:flex; align-items:center;
             justify-content:center; font-size:13px; font-weight:700; margin-top:2px; }
  .msg.user { flex-direction:row-reverse; }
  .msg.user .av { background:var(--accent); color:#fff; }
  .msg.agent .av { background:var(--panel2); color:var(--accent2); border:1px solid var(--line); }
  .bubble { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 15px;
            max-width:84%; font-size:14px; line-height:1.55; }
  .msg.user .bubble { background:var(--accent); border-color:var(--accent); color:#fff; }
  .bubble b { color:var(--accent2); } .msg.user .bubble b { color:#fff; }
  /* working card */
  .work h3 { margin:0 0 10px; font-size:13px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; }
  .steps { list-style:none; margin:0; padding:0; }
  .steps li { display:flex; gap:10px; padding:5px 0; font-size:13px; align-items:flex-start; }
  .ic { width:16px; height:16px; flex:0 0 16px; margin-top:2px; border-radius:50%;
        border:2px solid var(--line); }
  li.run .ic { border-color:var(--accent); border-top-color:transparent; animation:spin .9s linear infinite; }
  li.done .ic { background:var(--ok); border-color:var(--ok); position:relative; }
  li.done .ic::after { content:"✓"; color:#fff; font-size:10px; position:absolute; left:2px; top:-1px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .steps .d { color:var(--mut); font-size:12px; }
  .steps .rt { color:var(--warn); font-size:12px; }
  /* event cards */
  .cards { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .card { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .card .h { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px; color:#fff; }
  .badge.high{ background:var(--err);} .badge.medium{ background:var(--warn);} .badge.low{ background:#7cb342;}
  .card .t { font-weight:600; font-size:13.5px; }
  .card .dt { color:var(--mut); font-size:12px; }
  .card .r { color:#c9cedb; font-size:13px; margin:5px 0; }
  .card .al { color:var(--accent2); font-size:12px; }
  .card a { color:var(--accent2); font-size:12px; word-break:break-all; }
  /* chart + downloads */
  iframe { width:100%; height:600px; border:1px solid var(--line); border-radius:12px; background:#fff; margin-top:8px; }
  .dl { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .dl a { font-size:12px; background:var(--panel2); border:1px solid var(--line); border-radius:8px;
          padding:6px 12px; color:var(--fg); text-decoration:none; }
  .dl a:hover { border-color:var(--accent); }
  .bubble.err { border-color:var(--err); color:#ffb4b4; }
  .modepill { font-size:11px; color:var(--mut); border:1px solid var(--line); border-radius:20px; padding:1px 8px; }
  /* composer */
  #composer { border-top:1px solid var(--line); background:var(--bg); }
  #composer .row { max-width:880px; margin:0 auto; padding:12px 20px; display:flex; gap:8px; align-items:center; }
  #q { flex:1; background:var(--panel); border:1px solid var(--line); color:var(--fg); border-radius:10px;
       padding:11px 14px; font-size:14px; }
  #composer input[type=date], #composer #tickers, #composer #mode {
       background:var(--panel); border:1px solid var(--line); color:var(--mut);
       border-radius:10px; padding:9px 8px; font-size:12px; }
  #composer #mode { color:var(--fg); cursor:pointer; }
  #composer #tickers { color:var(--fg); min-width:150px; }
  /* comparison summary tables */
  table.cmp { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:8px; }
  table.cmp th, table.cmp td { text-align:right; padding:5px 8px; border-bottom:1px solid var(--line); }
  table.cmp th:first-child, table.cmp td:first-child { text-align:left; }
  table.cmp thead th { color:var(--mut); font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:.03em; }
  table.cmp .pos { color:var(--ok); } table.cmp .neg { color:var(--err); }
  .cmp-h { color:var(--mut); font-size:12px; margin:10px 0 2px; text-transform:uppercase; letter-spacing:.04em; }
  #send { background:var(--accent); color:#fff; border:0; border-radius:10px; padding:11px 18px;
          font-weight:600; font-size:14px; cursor:pointer; min-width:74px; }
  #send.stop { background:var(--err); }
  #send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>realtime-agent-visualize</h1>
  <span class="sub">chat with the analysis agent — it streams its workflow, then shows the chart, events, and files</span>
</header>

<main id="chat"><div class="inner" id="thread"></div></main>

<form id="composer">
  <div class="row">
    <select id="mode" title="Mode">
      <option value="analyze">Analyze</option>
      <option value="compare">Compare</option>
    </select>
    <input id="q" autocomplete="off"
           value="Analyze NVDA and mark AI industry events on the inflection points"
           placeholder="Ask about a stock… e.g. Analyze NVDA over the last 5 years">
    <input id="tickers" autocomplete="off" value="GC=F,BTC-USD" title="Comma-separated symbols"
           placeholder="GC=F,BTC-USD" style="display:none">
    <input id="start" type="date" value="2022-09-01" title="Start">
    <input id="end" type="date" value="2023-07-01" title="End">
    <button id="send" type="submit">Send</button>
  </div>
</form>

<script>
const thread = document.getElementById("thread"), chat = document.getElementById("chat"),
      sendBtn = document.getElementById("send");
let es = null, work = null, steps = {}, currentMode = "analyze";
const esc = (s) => { const d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; };
const scroll = () => { chat.scrollTop = chat.scrollHeight; };

function bubble(role, cls) {
  const m = document.createElement("div"); m.className = "msg " + role;
  const av = document.createElement("div"); av.className = "av"; av.textContent = role === "user" ? "you" : "◆";
  const b = document.createElement("div"); b.className = "bubble " + (cls || "");
  m.appendChild(av); m.appendChild(b); thread.appendChild(m); scroll();
  return b;
}

function inferTicker(text) { const m = text.match(/\b([A-Z]{1,5})\b/); return m ? m[1] : "NVDA"; }

function setRunning(on) {
  sendBtn.textContent = on ? "Stop" : "Send";
  sendBtn.classList.toggle("stop", on);
}

function startRun() {
  const q = document.getElementById("q").value.trim() || "Analyze NVDA";
  const ticker = inferTicker(q);
  const start = document.getElementById("start").value, end = document.getElementById("end").value;
  bubble("user").textContent = q;
  work = null; steps = {}; currentMode = "analyze";
  setRunning(true);
  const params = new URLSearchParams({ ticker, start, end });
  es = new EventSource("/api/run?" + params.toString());
  es.onmessage = onEvent;
  es.onerror = () => { finish(); };
}

function startCompare() {
  const tickers = document.getElementById("tickers").value.trim() || "GC=F,BTC-USD";
  const start = document.getElementById("start").value, end = document.getElementById("end").value;
  bubble("user").textContent = "Compare " + tickers + " (monthly-rebalanced backtest)";
  work = null; steps = {}; currentMode = "compare";
  setRunning(true);
  const params = new URLSearchParams({ tickers, start, end, rebalance: "monthly" });
  es = new EventSource("/api/compare?" + params.toString());
  es.onmessage = onEvent;
  es.onerror = () => { finish(); };
}

function pct(x) { const c = x >= 0 ? "pos" : "neg"; return `<span class="${c}">${(x*100).toFixed(1)}%</span>`; }

function stopRun() {
  if (es) { es.close(); es = null; }          // closing the stream cancels the pipeline server-side
  if (work) { const h = work.querySelector("h3"); if (h) h.textContent = "Stopped"; }
  bubble("agent").textContent = "Stopped.";
  setRunning(false);
}

function findStep(name) {
  const k = Object.keys(steps).find(t => t.toLowerCase().startsWith(name.toLowerCase()));
  return k ? steps[k] : null;
}

function onEvent(ev) {
  const d = JSON.parse(ev.data);
  switch (d.type) {
    case "mode": {
      const b = bubble("agent");
      b.innerHTML = `On it — analyzing <b>${esc(d.ticker)}</b> from <b>${esc(d.range[0])}</b> to <b>${esc(d.range[1])}</b>. ` +
        `<span class="modepill">${d.llm ? "LLM event curation on" : "no API key → chart + inflections only"}</span>`;
      break;
    }
    case "cmp_mode": {
      const b = bubble("agent");
      b.innerHTML = `On it — comparing <b>${esc(d.tickers.join(" vs "))}</b> from <b>${esc(d.range[0])}</b> to <b>${esc(d.range[1])}</b>. ` +
        `<span class="modepill">deterministic · ${esc(d.rebalance)}-rebalanced backtest · no API key needed</span>`;
      break;
    }
    case "cmp_result": {
      if (work) work.querySelector("h3").textContent = "Comparison complete";
      const b = bubble("agent");
      let html = `Done — compared <b>${esc(d.title)}</b> over <b>${d.days}</b> common trading days.`;
      html += '<div class="cmp-h">Per-asset (buy &amp; hold)</div>';
      html += '<table class="cmp"><thead><tr><th>Asset</th><th>Total</th><th>CAGR</th><th>Vol</th><th>Sharpe</th><th>Max DD</th></tr></thead><tbody>';
      d.metrics.forEach(m => {
        html += `<tr><td>${esc(m.ticker)}</td><td>${pct(m.total)}</td><td>${pct(m.cagr)}</td>` +
          `<td>${(m.vol*100).toFixed(1)}%</td><td>${m.sharpe.toFixed(2)}</td><td>${pct(m.maxdd)}</td></tr>`;
      });
      html += '</tbody></table>';
      html += '<div class="cmp-h">Strategy backtests</div>';
      html += '<table class="cmp"><thead><tr><th>Strategy</th><th>Total</th><th>Max DD</th><th>Rebals</th><th>Cost drag</th></tr></thead><tbody>';
      d.backtests.forEach(x => {
        html += `<tr><td>${esc(x.name)}</td><td>${pct(x.total)}</td><td>${pct(x.maxdd)}</td>` +
          `<td>${x.rebalances}</td><td>${(x.cost_drag*100).toFixed(2)}%</td></tr>`;
      });
      html += '</tbody></table>';
      if (d.correlations.length) {
        const c = d.correlations[0];
        html += `<div class="cmp-h">Correlation</div><div class="card"><div class="r">${esc(c.a)} vs ${esc(c.b)} daily-return Pearson: <b>${c.pearson >= 0 ? "+" : ""}${c.pearson.toFixed(2)}</b></div></div>`;
      }
      b.innerHTML = html;
      break;
    }
    case "plan": {
      const b = bubble("agent", "work");
      let html = '<h3>Working through it…</h3><ul class="steps">';
      d.steps.forEach(s => { html += `<li data-k="${esc(s)}"><span class="ic"></span><div><div class="nm">${esc(s)}</div></div></li>`; });
      b.innerHTML = html + "</ul>";
      work = b;
      b.querySelectorAll("li").forEach(li => { steps[li.getAttribute("data-k")] = li; });
      break;
    }
    case "act": { const li = findStep(d.step); if (li) li.className = "run"; break; }
    case "observe": {
      const li = findStep(d.step);
      if (li) { li.className = "done";
        const e = document.createElement("div"); e.className = "d"; e.textContent = d.detail;
        li.querySelector("div").appendChild(e); }
      break;
    }
    case "retry": {
      const li = findStep(d.step);
      if (li) { const r = document.createElement("div"); r.className = "rt";
        r.textContent = `retry ${d.attempt}: ${d.error}`; li.querySelector("div").appendChild(r); }
      break;
    }
    case "validate": { const li = findStep("validate"); if (li) li.className = "done"; break; }
    case "result": {
      if (work) work.querySelector("h3").textContent = "Analysis complete";
      const b = bubble("agent");
      b.innerHTML = `Done. I reviewed <b>${d.bars}</b> daily bars, detected <b>${d.inflections}</b> ` +
        `inflection points, curated <b>${d.events}</b> AI-industry events, and aligned <b>${d.alignments}</b> ` +
        `of them to price moves.`;
      break;
    }
    case "events": {
      const b = bubble("agent");
      if (!d.items.length) { b.textContent = "No industry events surfaced for this window."; break; }
      let html = "Here are the key events I surfaced:" + '<div class="cards">';
      d.items.forEach(c => {
        const al = c.aligned
          ? `<div class="al">↳ aligned to ${esc(c.inflection)} (${esc(c.kind)}) · lag ${c.lag}d · ${Math.round(c.confidence*100)}% confidence</div>`
          : "";
        const src = c.source ? `<a href="${esc(c.source)}" target="_blank" rel="noopener">${esc(c.source)}</a>` : "";
        html += `<div class="card"><div class="h"><span class="badge ${esc(c.impact)}">${esc(c.impact.toUpperCase())}</span>` +
          `<span class="t">${esc(c.title)}</span><span class="dt">${esc(c.date)}</span></div>` +
          `<div class="r">${esc(c.rationale)}</div>${al}${src}</div>`;
      });
      b.innerHTML = html + "</div>";
      break;
    }
    case "artifacts": {
      const b = bubble("agent");
      b.innerHTML = currentMode === "compare"
        ? "Here's the interactive comparison — rebased performance, backtest equity curves, and rolling correlation:"
        : "Here's the interactive K-line — click any event marker to trace it back to its source:";
      if (d.html) { const f = document.createElement("iframe"); f.src = d.html; b.appendChild(f); }
      let dl = '<div class="dl">';
      d.items.forEach(it => { dl += `<a href="${esc(it.url)}" download>↓ ${esc(it.name)}</a>`; });
      b.insertAdjacentHTML("beforeend", "<div style='margin-top:10px;color:var(--mut);font-size:13px'>Deliverables:</div>" + dl + "</div>");
      scroll();
      break;
    }
    case "stopped": { if (work) { const h = work.querySelector("h3"); if (h) h.textContent = "Stopped"; } finish(); break; }
    case "error": { bubble("agent", "err").textContent = "Run failed: " + d.message; break; }
    case "done": { finish(); break; }
  }
  scroll();
}

function finish() { if (es) { es.close(); es = null; } setRunning(false); }

const modeSel = document.getElementById("mode");
modeSel.addEventListener("change", () => {
  const compare = modeSel.value === "compare";
  document.getElementById("q").style.display = compare ? "none" : "";
  document.getElementById("tickers").style.display = compare ? "" : "none";
});

document.getElementById("composer").addEventListener("submit", (e) => {
  e.preventDefault();
  if (es) { stopRun(); }                          // toggles Send ↔ Stop
  else if (modeSel.value === "compare") { startCompare(); }
  else { startRun(); }
});
</script>
</body>
</html>
