name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dev toolchain)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check agent tests
      - name: Type-check
        run: mypy agent
      - name: Test
        run: pytest -q
