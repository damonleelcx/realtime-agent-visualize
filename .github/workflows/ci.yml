name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dev toolchain incl. Office renderers)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check agent tests
      - name: Type-check (strict)
        run: mypy agent
      - name: Test
        run: pytest -q
      - name: No-secret gate (P-INV-4)
        run: |
          # Fail the build if any key-shaped string appears in a committed artifact.
          if grep -rInE 'sk-[A-Za-z0-9]{16,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{20,}' samples artifacts 2>/dev/null; then
            echo "::error::key-shaped string found in a committed artifact"; exit 1
          fi
          echo "no secrets found in samples/artifacts"
